apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carduitive3-ingress
  namespace: carduitive3
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "carduitive3-ip"
    networking.gke.io/pre-shared-certs: "ssl-certificate"
spec:
  rules:
    - host: carduitive3.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  backendTLS:
    - service:
        name: frontend
      secret:
        name: tls-secret
