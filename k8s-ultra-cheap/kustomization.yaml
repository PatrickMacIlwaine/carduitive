apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carduitive3

resources:
  - 00-namespace.yaml
  - 01-postgres-pvc.yaml
  - 02-postgres-deployment.yaml
  - 03-postgres-service.yaml
  - 04-backend-deployment.yaml
  - 05-backend-service.yaml
  - 06-frontend-deployment.yaml
  - 07-frontend-service.yaml
  # Note: 08-secrets.yaml is excluded - apply manually after editing

images:
  - name: us-east1-docker.pkg.dev/PROJECT_ID/carduitive3/carduitive3-backend
    newName: us-east1-docker.pkg.dev/YOUR_PROJECT_ID/carduitive3/carduitive3-backend
    newTag: latest
  - name: us-east1-docker.pkg.dev/PROJECT_ID/carduitive3/carduitive3-frontend
    newName: us-east1-docker.pkg.dev/YOUR_PROJECT_ID/carduitive3/carduitive3-frontend
    newTag: latest
