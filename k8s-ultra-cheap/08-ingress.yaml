apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carduitive-ingress
  namespace: carduitive
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
    - host: carduitive.com
      http:
        paths:
          # Backend API routes
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 80
          # WebSocket routes
          - path: /ws/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 80
          # Frontend (default - everything else)
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
