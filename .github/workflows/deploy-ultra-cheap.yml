name: Deploy to GKE (Ultra-Cheap)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: carduitive3-cluster
  GKE_ZONE: us-east1-b
  REGION: us-east1
  REPOSITORY: carduitive3
  IMAGE_BACKEND: carduitive3-backend
  IMAGE_FRONTEND: carduitive3-frontend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend linter
        working-directory: backend
        run: pip install ruff && ruff check .

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Build and push backend image
        run: |
          docker build -t ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_BACKEND:${{ github.sha }} ./backend
          docker push ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_BACKEND:${{ github.sha }}
          docker tag ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_BACKEND:${{ github.sha }} ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_BACKEND:latest
          docker push ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_BACKEND:latest

      - name: Build and push frontend image
        run: |
          docker build -t ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_FRONTEND:${{ github.sha }} ./frontend
          docker push ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_FRONTEND:${{ github.sha }}
          docker tag ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_FRONTEND:${{ github.sha }} ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_FRONTEND:latest
          docker push ${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_FRONTEND:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up GCloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to GKE
        run: |
          # Update image tags in ultra-cheap manifests
          sed -i 's|us-east1-docker.pkg.dev/PROJECT_ID/carduitive3/carduitive3-backend:latest|us-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}|g' k8s-ultra-cheap/04-backend-deployment.yaml
          sed -i 's|us-east1-docker.pkg.dev/PROJECT_ID/carduitive3/carduitive3-frontend:latest|us-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}|g' k8s-ultra-cheap/06-frontend-deployment.yaml
          
          # Apply all manifests
          kubectl apply -f k8s-ultra-cheap/
          
          # Wait for deployments to be ready
          kubectl rollout status deployment/postgres -n carduitive3 --timeout=120s
          kubectl rollout status deployment/backend -n carduitive3 --timeout=120s
          kubectl rollout status deployment/frontend -n carduitive3 --timeout=120s
